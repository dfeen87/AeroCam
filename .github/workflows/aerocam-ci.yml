name: AeroCam Firmware CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build AeroCam (${{ matrix.mcu }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        mcu: [ "F4", "F7", "H7" ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install ARM GCC Toolchain
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: "13.2.Rel1"

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Configure CMake
      run: |
        rm -rf build-${{ matrix.mcu }}
        cmake -S . -B build-${{ matrix.mcu }} \
          -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/arm-gcc-toolchain.cmake \
          -DMCU=${{ matrix.mcu }} \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build firmware
      run: cmake --build build-${{ matrix.mcu }} --config Release --parallel

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AeroCam-${{ matrix.mcu }}
        path: |
          build-${{ matrix.mcu }}/*.elf
          build-${{ matrix.mcu }}/*.bin
          build-${{ matrix.mcu }}/*.map

  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install native build tools
      run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build

    - name: Configure tests
      run: |
        rm -rf build-tests
        cmake -S . -B build-tests \
          -G Ninja \
          -DAEROCAM_TESTS=ON

    - name: Build tests
      run: cmake --build build-tests --config Release --parallel

    - name: Run tests
      working-directory: build-tests
      run: ctest --output-on-failure
